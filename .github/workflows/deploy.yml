name: deploy

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/moing/**'
      - 'packages/**'
      - 'package-lock.json'
      - 'package.json'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'apps/moing/**'
      - 'packages/**'
      - 'package-lock.json'
      - 'package.json'

permissions:
  contents: read

env:
  HUSKY: 0 # Skip Husky during CI: https://typicode.github.io/husky/how-to.html#ci-server-and-docker

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up checkout
        uses: actions/checkout@v7

      - name: Validate deployment variables
        if: vars.BACKEND_URL == ''
        run: echo "BACKEND_URL is not set. Please set it in the repository settings." && exit 1

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm # https://github.com/actions/setup-node#caching-global-packages-data

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build
        run: node --run build:m
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}

      - name: Upload static files as artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/moing/build

  deploy:
    runs-on: ubuntu-latest

    needs: build

    if: github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      pages: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
